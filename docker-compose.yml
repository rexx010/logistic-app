services:

  # ── App Instances ───────────────────────────────────────────────────
  # Ports are exposed directly for now (no Nginx in front).
  # When ready for production, re-add Nginx and remove the host port bindings.
  app1:
    build: .
    env_file: .env
    environment:
      - APP_PORT=8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - logistic_net

